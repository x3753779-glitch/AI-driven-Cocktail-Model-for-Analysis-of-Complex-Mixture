name: Keep Hugging Face Space awake

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visit Space
        run: |
          set -e
          curl --fail --location --max-time 60 --retry 3 --retry-delay 10 "https://sxhir-liquid-analyzer.hf.space/?keepalive=$(date +%s)"
